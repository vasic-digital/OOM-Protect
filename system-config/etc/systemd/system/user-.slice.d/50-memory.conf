[Slice]
MemoryAccounting=yes
# Elastic / "liquid" memory: use all available RAM, throttle/kill only near TRUE
# exhaustion — never prematurely.
#   MemoryHigh=90%  soft reclaim starts only at 90% (was 48G -> constant reclaim,
#                   the multi-billion-pgscan "system gets stuck" storm).
#   MemoryMax=95%   hard backstop just below full so a real runaway can't freeze
#                   the whole box (leaves ~5% headroom for the system slice).
#   MemorySwapMax=infinity  no per-slice swap cap -> processes swap to zram/swap
#                   elastically instead of being OOM-killed (was 8G).
# Percentages adapt to any host (were host-specific absolutes for a 62 GiB box).
MemoryHigh=90%
MemoryMax=95%
MemorySwapMax=infinity
TasksMax=infinity
