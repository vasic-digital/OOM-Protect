[Slice]
# Kill ONLY at true exhaustion. Was 50%/20s, which fired under normal reclaim
# with tens of GiB free — killing >3 concurrent Claude/agent sessions. Now oomd
# acts only on SUSTAINED (60s) SEVERE (90% PSI) memory stall, or when swap is
# genuinely full (see oomd.conf SwapUsedLimit). Still enabled, so a real runaway
# is stopped before the system freezes — elastic under load, safe at the edge.
ManagedOOMSwap=kill
ManagedOOMMemoryPressure=kill
ManagedOOMMemoryPressureLimit=90%
ManagedOOMMemoryPressureDurationSec=60s
