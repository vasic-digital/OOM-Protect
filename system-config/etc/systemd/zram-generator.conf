# Elastic compressed swap (zram) via systemd zram-generator. zstd, sized to half
# of RAM (stored ~3x compressed, so real RAM cost is a fraction) at high priority
# so pages swap to fast RAM-backed zram before disk -> large elastic headroom,
# memory rarely reaches the cgroup caps, and the system never disk-swap-thrashes.
[zram0]
zram-size = ram / 2
compression-algorithm = zstd
swap-priority = 100
