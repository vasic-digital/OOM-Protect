[OOM]
# System-wide oomd defaults: act only at genuine exhaustion, not on transient
# load. Was 80%/50%/20s (fired with RAM free). Swap must be nearly full (90%) and
# pressure sustained-severe (90% for 60s) before oomd steps in.
SwapUsedLimit=90%
DefaultMemoryPressureLimit=90%
DefaultMemoryPressureDurationSec=60s
