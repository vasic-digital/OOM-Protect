# Raise the per-user process/thread ceiling so many concurrent thread-heavy
# agents (node / Claude Code) never hit "fork: retry: Resource temporarily
# unavailable". Overrides the low distro default (50-defaults.conf: nproc
# 512 soft / 1024 hard). The 99- prefix ensures pam_limits reads this LAST so
# it wins over earlier files. cgroup TasksMax stays the real ceiling (infinity
# on the user slice); this just removes the artificial pam ceiling.
*		soft	nproc	65536
*		hard	nproc	65536
root		soft	nproc	65536
